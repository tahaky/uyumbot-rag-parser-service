version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: rag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  chunking-service:
    build: .
    ports:
      - "8082:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/rag
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      MAX_CHUNK_SIZE: 800
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
