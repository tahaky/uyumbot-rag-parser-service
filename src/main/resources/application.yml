spring:
  application:
    name: chunking-service

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/rag}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

chunking:
  max-chunk-size: ${MAX_CHUNK_SIZE:800}

logging:
  level:
    com.uyumbot: INFO
    org.hibernate.SQL: WARN
